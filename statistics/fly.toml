# Fly.io deployment configuration
app = "security-data-server"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  DATABASE_TYPE = "sqlite"
  DATABASE_PATH = "/data/security.db"
  SESSION_EXPIRY_HOURS = "24"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/"

[mounts]
  source = "security_data"
  destination = "/data"
  initial_size = "1GB"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256MB"
